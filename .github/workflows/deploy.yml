name: Fullstack CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}

          script: |
            set -e
            echo "🚀 Deployment Started"

            whoami
            pwd
            ls -la

            cd /home/sooraj/Work-Sheet-1

            echo "📂 After cd:"
            pwd
            ls

            echo "🔗 Git remote:"
            git remote -v

            echo "⬇️ Pulling code..."
            git pull origin main

            echo "📦 Backend setup"
            cd backend

            python3 -m venv venv || true
            source venv/bin/activate
            pip install -r requirements.txt

            pm2 restart backend || pm2 start /home/sooraj/Work-Sheet-1/backend/venv/bin/uvicorn --name backend --interpreter none -- app.main:app --host 0.0.0.0 --port 5000

            echo "🌐 Frontend setup"
            cd ../work-updates

            npm install
            npm run build

            pm2 restart frontend || pm2 start npx --name frontend -- serve -s dist -l 4173

            pm2 save

            echo "✅ Deployment Completed Successfully!"
